<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceHunt</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#080c0a;--bg2:#0e1512;--card:#131d17;--fg:#e2ede6;--muted:#5e8a72;--accent:#10b981;--border:#1a2f24;--danger:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg)}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;transition:all .2s}
.card:hover{border-color:rgba(16,185,129,.3)}
.input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--fg);font-size:.85rem;width:100%;outline:none;transition:border .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--muted)}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:all .2s}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{opacity:.85}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-g:hover{color:var(--fg);border-color:var(--muted)}
.btn-danger{background:transparent;border:1px solid rgba(239,68,68,.3);color:var(--danger)}.btn-danger:hover{background:rgba(239,68,68,.1)}
select.input{cursor:pointer}select.input option{background:var(--card)}
table{width:100%;border-collapse:collapse}
th{background:var(--bg2);padding:10px 14px;text-align:left;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid rgba(26,47,36,.4);font-size:.85rem}
tr:hover td{background:rgba(16,185,129,.02)}
.badge-ok{background:#065f46;color:#6ee7b7;font-size:.65rem;padding:2px 6px;border-radius:10px;font-weight:700}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);padding:14px 22px;border-radius:12px;z-index:99;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;box-shadow:0 10px 30px rgba(0,0,0,.4)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.tag{background:var(--bg);padding:2px 8px;border-radius:6px;font-size:.7rem;color:var(--accent);font-weight:600}
</style>
</head>
<body>
<div style="max-width:1100px;margin:0 auto;padding:24px">
  <header style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px">
    <div>
      <h1 style="font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:10px"><i class="fas fa-tags" style="color:var(--accent)"></i> PriceHunt</h1>
      <p style="font-size:.8rem;color:var(--muted);margin-top:2px">Añade webs y scrapea precios</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-g" onclick="loadData()"><i class="fas fa-rotate"></i> Recargar</button>
      <button class="btn btn-p" onclick="exportCSV()"><i class="fas fa-download"></i> Exportar</button>
    </div>
  </header>
  <div class="card" style="padding:24px;margin-bottom:24px">
    <h2 style="font-size:1rem;font-weight:700;margin-bottom:16px"><i class="fas fa-plus-circle" style="color:var(--accent);margin-right:6px"></i>Añadir nueva web</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div
